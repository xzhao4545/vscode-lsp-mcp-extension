<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <linearGradient id="main" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0ea5e9"/>
            <stop offset="100%" style="stop-color:#8b5cf6"/>
        </linearGradient>
        <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1e293b"/>
            <stop offset="100%" style="stop-color:#0f172a"/>
        </linearGradient>
    </defs>

    <!-- 外框：MCP协议层 - 修改：fill改为url(#bg) -->
    <rect x="5" y="5" width="90" height="90" rx="12" fill="url(#bg)" stroke="url(#main)" stroke-width="3"/>

    <!-- MCP大字 -->
    <text x="50" y="55" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" letter-spacing="3">MCP</text>

    <!-- 底部LSP标识 -->
    <text x="50" y="74" text-anchor="middle" fill="url(#main)" font-family="monospace" font-size="12" font-weight="bold">{ LSP }</text>
</svg>